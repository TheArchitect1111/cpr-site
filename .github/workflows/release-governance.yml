name: Release Governance

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deploy (lint, build, smoke, governance)
        run: npm run verify:deploy
        env:
          GOVERNANCE_DEPLOY_APPROVAL: github-actions
          GOVERNANCE_VISUAL_QA: skipped

      - name: Upload governance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-reports
          path: |
            governance/reports/
            docs/releases/latest.json
